                    <select id="storage" class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                        <option value="512GB">512GB</option>
                        <option value="1TB" selected>1TB</option>
                        <option value="2TB">2TB</option>
                        <option value="4TB">4TB</option>
                        <option value="8TB">8TB</option>
                    </select>
                </div>

                    <label class="block text-sm font-semibold text-gray-700 mb-1">Condition</label>

                        <option value="Good" selected>Good (85%)</option>
                        <option value="Fair">Fair (70%)</option>
                        <option value="Poor">Poor (45%)</option>
                    </select>
                </div>
            </div>
            
            <button onclick="calculate()" class="mt-6 w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                Calculate Pricing

        </div>

        // -----------------------------
        // DEPRECIATION RATES & MULTIPLIERS
        // -----------------------------
        const DEPRECIATION = {
            "M5": { "low": 0.22, "mid": 0.18, "high": 0.14 },
            "M4": { "low": 0.30, "mid": 0.26, "high": 0.22 },
            "M3": { "low": 0.40, "mid": 0.35, "high": 0.30 },
            "M2": { "low": 0.50, "mid": 0.45, "high": 0.40 }
        };

        const CONDITION_MULT = {
            "Excellent": 1.00,
            "Good": 0.85,
            "Fair": 0.70,
            "Poor": 0.45
        };

        // -----------------------------
        // INIT & PARSE DATABASE
        // -----------------------------
        const floorPrices = {};
        
        function initDB() {
            const lines = RAW_PRICE_DB.trim().split('\n');
            lines.forEach(line => {
                if (!line.trim()) return;
                try {
                    const partsArray = line.split('/').map(p => p.trim());
                    const parts = {};
                    partsArray.forEach(p => {
                        const splitIdx = p.indexOf(':');
                        if(splitIdx > -1) {
                            parts[p.substring(0, splitIdx).trim()] = p.substring(splitIdx + 1).trim();
                        }
                    });

                    const screen = parts['Screen Size'] || '14-inch';
                    const raw_cpu = parts['Processor'] || 'Unknown';
                    
                    // Match "M5 Pro" or "M4 Max" or "M3"
                    const cpuMatch = raw_cpu.match(/(M\d\s*(?:Pro|Max)?)/);
                    const base_cpu = cpuMatch ? cpuMatch[1].trim() : raw_cpu.split(' ')[0];
                    
                    const ssd = parts['Storage'] || 'Unknown';
                    const ram = (parts['Memory'] || 'Unknown').replace(/\s/g, '');
                    
                    const priceStr = (parts['Price'] || '0').replace('$', '').replace(',', '').trim();
                    const msrpStr = (parts['MSRP'] || '0').replace('$', '').replace(',', '').trim();
                    
                    const price = parseInt(priceStr);
                    const msrp = parseInt(msrpStr);
                    
                    const key = `${base_cpu} ${screen} ${ram} ${ssd}`;
                    
                    if (!floorPrices[key] || price < floorPrices[key].price) {
                        floorPrices[key] = { price, msrp };
                    }
                } catch (e) {
                    console.error("Failed to parse line:", line, e);
                }
            });
            console.log("Database initialized. Unique items:", Object.keys(floorPrices).length);
        }

        // -----------------------------
        // CALCULATE FUNCTION
        // -----------------------------
        function calculate() {
            const family = document.getElementById('family').value; // e.g. "M5"
            const tierInput = document.getElementById('tier').value; // "", "Pro", "Max"
            const screen = document.getElementById('screen').value;
            const ram = document.getElementById('ram').value;
            const storage = document.getElementById('storage').value;
            const condition = document.getElementById('condition').value;

            // Reconstruct base_cpu exact format
            let base_cpu = family;
            if (tierInput) base_cpu += ` ${tierInput}`;
            
            const lookupKey = `${base_cpu} ${screen} ${ram} ${storage}`;
            const dbData = floorPrices[lookupKey];
            const statusMsg = document.getElementById('statusMessage');

            if (!dbData) {
                statusMsg.textContent = `❌ Not found in DB: ${lookupKey}`;
                statusMsg.className = "text-sm font-semibold text-red-600 mb-4 h-6";
                document.getElementById('outOffer').textContent = "$0";
                document.getElementById('outQuick').textContent = "$0";
                document.getElementById('outSafe').textContent = "$0";
                document.getElementById('outOpt').textContent = "$0";
                document.getElementById('outMSRP').textContent = "$0";
                document.getElementById('msrpDetails').textContent = "Orig MSRP: $0";
                return;
            }

            statusMsg.textContent = `✅ DB Match: ${lookupKey}`;
            statusMsg.className = "text-sm font-semibold text-green-600 mb-4 h-6";

            const raw_offer_price = dbData.price;
            const raw_msrp = dbData.msrp;

            const cond_mult = CONDITION_MULT[condition] || 1.0;
            const adjusted_offer_price = raw_offer_price * cond_mult;

            // Target calculations
            const quick_flip = Math.round(adjusted_offer_price * 1.27);
            const safe_price = Math.round(adjusted_offer_price * 1.32);
            const optimistic = Math.round(adjusted_offer_price * 1.38);

            // MSRP Depreciation calculations
            let tierCat = "low";
            if (tierInput === "Max") tierCat = "high";
            else if (tierInput === "Pro") tierCat = "mid";

            const depRateObj = DEPRECIATION[family] || DEPRECIATION["M2"];
            const depRate = depRateObj[tierCat] || 0.40;
            const msrp_target = Math.round(raw_msrp * (1 - depRate));

            // Format Currency
            const formatMoney = (num) => '$' + num.toLocaleString();

            // Update UI
            document.getElementById('outOffer').textContent = formatMoney(adjusted_offer_price);
            document.getElementById('outQuick').textContent = formatMoney(quick_flip);
            document.getElementById('outSafe').textContent = formatMoney(safe_price);
            document.getElementById('outOpt').textContent = formatMoney(optimistic);
            
            document.getElementById('outMSRP').textContent = formatMoney(msrp_target);
            document.getElementById('msrpDetails').textContent = `Orig MSRP: ${formatMoney(raw_msrp)} (Tier: ${tierCat})`;
        }

        // Run once on load
        window.onload = () => {
            initDB();
            calculate();
        };
    </script>
